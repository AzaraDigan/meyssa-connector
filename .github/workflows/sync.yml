name: sync

# Triggers the connector's /api/sync endpoint on a schedule, and on demand.
#
# Why GitHub Actions and not Vercel Cron: the Vercel free (Hobby) tier only allows
# once-per-day cron. This workflow polls every 30 minutes instead, on free runners.
#
# Interval: every 30 minutes. GitHub bills each scheduled run as at least 1 minute,
# so */30 (~1440 runs/month) stays inside a private repo's 2000 free minutes;
# */15 would not. 30 minutes is within the brief's "15 to 30 minute" window.
# Note: GitHub may delay scheduled runs under load; a few minutes of drift is fine.
#
# Required repo settings (Azara sets these once):
#   - Variable  SYNC_URL    = the deployed endpoint, e.g. https://<project>.vercel.app/api/sync
#   - Secret    SYNC_SECRET = the same value stored in Vercel env vars (from Bitwarden)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max jobs to sync (optional, leave blank for all; use 3 for a test run)"
        required: false
        default: ""

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST to /api/sync
        env:
          SYNC_URL: ${{ vars.SYNC_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_URL:-}" ]; then echo "SYNC_URL repo variable is not set"; exit 1; fi
          url="$SYNC_URL"
          if [ -n "${LIMIT:-}" ]; then url="${url}?limit=${LIMIT}"; fi
          echo "POST ${url%%\?*} (limit=${LIMIT:-none})"
          http_code=$(curl -sS -o response.json -w "%{http_code}" -X POST "$url" \
            -H "Authorization: Bearer ${SYNC_SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP ${http_code}"
          echo "--- response ---"
          cat response.json || true
          echo
          # Fail the run on a non-200 so sync failures are visible in the Actions tab.
          test "${http_code}" = "200"

      - name: Warn / fail on held or failed jobs
        # The HTTP call above returns 200 even when individual roles are held or fail,
        # so inspect the run summary here.
        #
        # We split holds into two buckets (see RunReport in src/lib/logger.js):
        #   - heldActionable: blocked by something other than the known description
        #     backlog (e.g. a blank PP/In-House dropdown, an unmapped location). These,
        #     and any per-job failures, FAIL the run so GitHub emails — that is the
        #     "a role was posted wrong" signal worth interrupting for.
        #   - heldBacklog: held ONLY on the full-description/missing-headings issue,
        #     tracked separately. These are WARNED (annotated) but do not fail the run,
        #     so the steady-state backlog does not spam failure emails every cycle.
        # A fully clean sync stays green.
        run: |
          set -euo pipefail
          test -f response.json || { echo "no response.json from previous step"; exit 1; }
          held=$(jq -r '.held // 0' response.json)
          actionable=$(jq -r '.heldActionable // 0' response.json)
          backlog=$(jq -r '.heldBacklog // 0' response.json)
          failed=$(jq -r '.failed // 0' response.json)
          echo "held=${held} (actionable=${actionable}, backlog=${backlog}) failed=${failed}"

          # Per-job annotations, visible inline on the Actions run.
          jq -r '.details.heldActionable[]? | "::warning title=Role held (needs review)::job-id \(.jobId) held on: \(.reason.unmapped | map(.field) | join(", "))"' response.json || true
          jq -r '.details.failed[]? | "::error title=Job failed::job-id \(.jobId) — \(.error)"' response.json || true
          if [ "${backlog}" != "0" ]; then
            echo "::warning title=Backlog holds::${backlog} role(s) held only on description headings (tracked separately; not failing the run)."
          fi

          if [ "${actionable}" != "0" ] || [ "${failed}" != "0" ]; then
            echo "::error::Sync needs attention — actionable holds=${actionable}, failed=${failed}. Set the PP/In-House dropdown (or fix the source) on the annotated job-ids."
            exit 1
          fi
          echo "No actionable holds or failures. (Backlog holds: ${backlog}.)"
